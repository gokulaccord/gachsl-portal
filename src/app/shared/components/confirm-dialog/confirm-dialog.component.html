<h2 mat-dialog-title>

    <mat-icon color="warn">warning</mat-icon>

    {{ data.title }}

</h2>

<mat-dialog-content>

    <p>{{ data.message }}</p>

    <strong *ngIf="data.itemName">

        {{ data.itemName }}

    </strong>

</mat-dialog-content>

<mat-dialog-actions align="end">

    <button
        mat-button
        (click)="close(false)">

        Cancel

    </button>

    <button
        mat-flat-button
        color="warn"
        (click)="close(true)">

        Delete

    </button>

</mat-dialog-actions>
