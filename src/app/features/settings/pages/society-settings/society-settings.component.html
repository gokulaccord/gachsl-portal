<mat-card>

  <mat-card-header>
    <mat-card-title>Society Settings</mat-card-title>
  </mat-card-header>

  <mat-card-content>

    <form [formGroup]="form">

      <mat-form-field appearance="outline">
        <mat-label>Society Name</mat-label>
        <input matInput formControlName="societyName">
      </mat-form-field>

      <br><br>

      <mat-form-field appearance="outline">
        <mat-label>Short Name</mat-label>
        <input matInput formControlName="societyShortName">
      </mat-form-field>

      <br><br>

      <mat-form-field appearance="outline">
        <mat-label>Total Flats</mat-label>
        <input matInput type="number" formControlName="totalFlats">
      </mat-form-field>

      <br><br>

      <mat-form-field appearance="outline">
        <mat-label>Total Shops</mat-label>
        <input matInput type="number" formControlName="totalShops">
      </mat-form-field>

      <br><br>

      <button
        mat-raised-button
        color="primary"
        (click)="save()">

        Save Settings

      </button>

    </form>

  </mat-card-content>

</mat-card>
