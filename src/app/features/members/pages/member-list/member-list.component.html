<mat-card>

    <div class="page-header">

        <div>
            <h2>👥 Members</h2>
            <span>{{dataSource.data.length}} Members</span>
        </div>

        <button mat-raised-button color="primary" (click)="addMember()">
            <mat-icon>add</mat-icon>
            Add Member
        </button>

    </div>

    <div class="toolbar">

        <mat-form-field appearance="outline" class="search-box">

            <mat-icon matPrefix>search</mat-icon>

            <input
                matInput
                placeholder="Search members..."
                (keyup)="applyFilter($event)">

        </mat-form-field>

    </div>

  <table mat-table [dataSource]="dataSource" matSort class="mat-elevation-z2">

    <ng-container matColumnDef="flatNumber">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>Flat</th>
        <td mat-cell *matCellDef="let m">{{m.flatNumber}}</td>
    </ng-container>

    <ng-container matColumnDef="fullName">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>Name</th>
        <td mat-cell *matCellDef="let m">{{m.fullName}}</td>
    </ng-container>

    <ng-container matColumnDef="phone">
        <th mat-header-cell *matHeaderCellDef>Phone</th>
        <td mat-cell *matCellDef="let m">{{m.phone}}</td>
    </ng-container>

    <ng-container matColumnDef="email">
        <th mat-header-cell *matHeaderCellDef>Email</th>
        <td mat-cell *matCellDef="let m">{{m.email}}</td>
    </ng-container>

    <ng-container matColumnDef="isOwner">
        <th mat-header-cell *matHeaderCellDef>Owner</th>
        <td mat-cell *matCellDef="let m">
          <mat-chip color="primary" highlighted>
  {{ m.isOwner ? 'Owner' : 'Tenant' }}
</mat-chip>
        </td>
    </ng-container>

    <ng-container matColumnDef="isActive">
        <th mat-header-cell *matHeaderCellDef>Active</th>
        <td mat-cell *matCellDef="let m">
           <mat-chip [color]="m.isActive ? 'primary' : 'warn'" highlighted>
  {{ m.isActive ? 'Active' : 'Inactive' }}
</mat-chip>
        </td>
    </ng-container>

    <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef width="120">Actions</th>

        <td mat-cell *matCellDef="let m">

           <button mat-icon-button color="primary" (click)="editMember(m)">
  <mat-icon>edit</mat-icon>
</button>

            <button mat-icon-button color="warn" (click)="deleteMember(m)">
  <mat-icon>delete</mat-icon>
</button>

        </td>

    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>

    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

</table>

<mat-paginator
    [pageSize]="10"
    [pageSizeOptions]="[5,10,20,50]">
</mat-paginator>

</mat-card>
