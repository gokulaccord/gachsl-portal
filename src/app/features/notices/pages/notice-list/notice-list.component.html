
 <app-page-header
    title="Notices"
    subtitle="Manage Society Notices"
    buttonText="Add Notice"
    buttonIcon="add"
    buttonRoute="/notices/add">
</app-page-header>
<app-search-toolbar
    placeholder="Search Notices"
    (search)="applyFilter($event)">
</app-search-toolbar>

<div class="table-container">

  <table mat-table
         [dataSource]="dataSource"
         matSort>

    <!-- Title -->
    <ng-container matColumnDef="title">

      <th mat-header-cell
          *matHeaderCellDef
          mat-sort-header>

        Title

      </th>

      <td mat-cell
          *matCellDef="let notice">

        {{ notice.title }}

      </td>

    </ng-container>


    <!-- Publish Date -->
    <ng-container matColumnDef="publishDate">

      <th mat-header-cell
          *matHeaderCellDef
          mat-sort-header>

        Date

      </th>

      <td mat-cell
          *matCellDef="let notice">

        {{ notice.publishDate | date:'dd-MM-yyyy' }}

      </td>

    </ng-container>


    <!-- Category -->
    <ng-container matColumnDef="category">

      <th mat-header-cell
          *matHeaderCellDef>

        Category

      </th>

      <td mat-cell
          *matCellDef="let notice">

        {{ notice.category }}

      </td>

    </ng-container>


    <!-- Priority -->
    <ng-container matColumnDef="priority">

      <th mat-header-cell
          *matHeaderCellDef>

        Priority

      </th>

      <td mat-cell
          *matCellDef="let notice">

        {{ notice.priority }}

      </td>

    </ng-container>


    <!-- Status -->
    <ng-container matColumnDef="isPublished">

      <th mat-header-cell
          *matHeaderCellDef>

        Status

      </th>

      <td mat-cell
          *matCellDef="let notice">

        <span *ngIf="notice.isPublished">
          Published
        </span>

        <span *ngIf="!notice.isPublished">
          Draft
        </span>

      </td>

    </ng-container>


    <!-- Actions -->
    <ng-container matColumnDef="actions">

      <th mat-header-cell
          *matHeaderCellDef>

        Actions

      </th>

      <td mat-cell
          *matCellDef="let notice">

        <!-- Edit -->

        <button
          mat-icon-button
          color="primary"
          (click)="edit(notice)">

          <mat-icon>edit</mat-icon>

        </button>


        <!-- Delete -->

        <button
          mat-icon-button
          color="warn"
          (click)="delete(notice)">

          <mat-icon>delete</mat-icon>

        </button>

      </td>

    </ng-container>


    <tr
      mat-header-row
      *matHeaderRowDef="displayedColumns">
    </tr>

    <tr
      mat-row
      *matRowDef="let row; columns: displayedColumns;">
    </tr>

  </table>


  <mat-paginator
    [pageSize]="10"
    [pageSizeOptions]="[5,10,25]">
  </mat-paginator>

</div>
