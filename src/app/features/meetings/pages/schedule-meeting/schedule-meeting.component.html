<app-page-header
    title="Schedule Meeting"
    subtitle="Create a new committee meeting">
</app-page-header>

<mat-card>

    <mat-card-content>

        <form [formGroup]="meetingForm">

            <div class="form-grid">

                <!-- Meeting Title -->
                <mat-form-field appearance="outline">
                    <mat-label>Meeting Title</mat-label>
                    <input
                        matInput
                        formControlName="meetingTitle">

                    <mat-error *ngIf="meetingForm.get('meetingTitle')?.hasError('required')">
                        Meeting Title is required
                    </mat-error>
                </mat-form-field>

                <!-- Meeting Type -->
                <mat-form-field appearance="outline">
                    <mat-label>Meeting Type</mat-label>

                    <mat-select formControlName="meetingType">

                        <mat-option
                            *ngFor="let type of meetingTypes"
                            [value]="type">

                            {{ type }}

                        </mat-option>

                    </mat-select>

                    <mat-error *ngIf="meetingForm.get('meetingType')?.hasError('required')">
                        Meeting Type is required
                    </mat-error>

                </mat-form-field>

                <!-- Meeting Date -->
                <mat-form-field appearance="outline">
                    <mat-label>Meeting Date</mat-label>

                    <input
                        matInput
                        [matDatepicker]="picker"
                        formControlName="meetingDate">

                    <mat-datepicker-toggle
                        matIconSuffix
                        [for]="picker">
                    </mat-datepicker-toggle>

                    <mat-datepicker #picker></mat-datepicker>

                </mat-form-field>

                <!-- Meeting Time -->
                <mat-form-field appearance="outline">
                    <mat-label>Meeting Time</mat-label>

                    <input
                        matInput
                        type="time"
                        formControlName="meetingTime">

                </mat-form-field>

                <!-- Venue -->
                <mat-form-field appearance="outline" class="full-width">
                    <mat-label>Venue</mat-label>

                    <input
                        matInput
                        formControlName="venue">

                </mat-form-field>
<mat-form-field appearance="outline" class="w-100">

    <mat-label>Meeting Minutes</mat-label>

    <textarea
        matInput
        rows="8"
        formControlName="minutes">
    </textarea>

</mat-form-field>
                <!-- Description -->
                <mat-form-field appearance="outline" class="full-width">

                    <mat-label>Description</mat-label>

                    <textarea
                        matInput
                        rows="5"
                        formControlName="description">
                    </textarea>

                </mat-form-field>

                <!-- Status -->
                <mat-form-field appearance="outline">

                    <mat-label>Status</mat-label>

                    <mat-select formControlName="status">

                        <mat-option
                            *ngFor="let status of statuses"
                            [value]="status">

                            {{ status }}

                        </mat-option>

                    </mat-select>

                </mat-form-field>

            </div>

            <div class="button-row">

                <button
                    mat-stroked-button
                    color="warn"
                    type="button"
                    (click)="cancel()">

                    Cancel

                </button>

                <button
                    mat-flat-button
                    color="primary"
                    type="button"
                    (click)="save()">

                    {{ isEditMode ? 'Update Meeting' : 'Save Meeting' }}
                </button>

            </div>

        </form>

    </mat-card-content>

</mat-card>
