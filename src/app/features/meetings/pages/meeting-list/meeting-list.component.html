<app-page-header
    title="Meetings"
    subtitle="Redevelopment Committee Meetings"
    buttonText="Schedule Meeting"
    buttonRoute="/meetings/add">
</app-page-header>
<mat-form-field appearance="outline" style="width:300px;margin-bottom:20px;">
    <mat-label>Search</mat-label>
    <input matInput (keyup)="applyFilter($event)" placeholder="Search meetings">
</mat-form-field>

<table mat-table [dataSource]="dataSource" matSort class="mat-elevation-z2">

    <!-- Date -->
    <ng-container matColumnDef="meetingDate">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>Date</th>
        <td mat-cell *matCellDef="let row">
            {{row.meetingDate | date:'dd-MMM-yyyy'}}
        </td>
    </ng-container>

    <!-- Title -->
    <ng-container matColumnDef="meetingTitle">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>Meeting</th>
        <td mat-cell *matCellDef="let row">
            {{row.meetingTitle}}
        </td>
    </ng-container>

    <!-- Venue -->
    <ng-container matColumnDef="venue">
        <th mat-header-cell *matHeaderCellDef>Venue</th>
        <td mat-cell *matCellDef="let row">
            {{row.venue}}
        </td>
    </ng-container>

    <!-- Type -->
    <ng-container matColumnDef="meetingType">
        <th mat-header-cell *matHeaderCellDef>Type</th>
        <td mat-cell *matCellDef="let row">
            {{row.meetingType}}
        </td>
    </ng-container>

    <!-- Status -->
    <ng-container matColumnDef="status">
        <th mat-header-cell *matHeaderCellDef>Status</th>
        <td mat-cell *matCellDef="let row">
            {{row.status}}
        </td>
    </ng-container>

    <!-- Actions -->
    <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef width="120">Actions</th>
        <td mat-cell *matCellDef="let row">

            <button
    mat-icon-button
    color="primary"
    [routerLink]="['/meetings/edit', row.meetingId]">
    <mat-icon>edit</mat-icon>
</button>

            <button
    mat-icon-button
    color="warn"
    (click)="deleteMeeting(row)">
    <mat-icon>delete</mat-icon>
</button>

        </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>

    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

</table>

<mat-paginator
    [pageSize]="10"
    [pageSizeOptions]="[5,10,20]">
</mat-paginator>
