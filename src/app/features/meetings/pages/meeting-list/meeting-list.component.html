<app-page-header
    title="Meetings"
    subtitle="Manage Society Meetings"
    buttonText="Schedule Meeting"
    buttonIcon="event"
    buttonRoute="/meetings/add">
</app-page-header>
<app-search-toolbar
    placeholder="Search Meetings"
    (search)="applyFilter($event)">
</app-search-toolbar>
<table mat-table [dataSource]="dataSource" matSort class="mat-elevation-z2">

    <!-- Date -->
    <ng-container matColumnDef="meetingDate">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>Date</th>
        <td mat-cell *matCellDef="let row">
            {{row.meetingDate | date:'dd-MMM-yyyy'}}
        </td>
    </ng-container>
<!-- Time -->

<ng-container matColumnDef="meetingTime">

    <th mat-header-cell *matHeaderCellDef>

        Time

    </th>

    <td mat-cell *matCellDef="let row">

        <mat-icon class="time-icon">
            schedule
        </mat-icon>

        {{ formatTime(row.meetingTime) }}

    </td>

</ng-container>
    <!-- Title -->
    <ng-container matColumnDef="meetingTitle">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>Meeting</th>
        <td mat-cell *matCellDef="let row">
            {{row.meetingTitle}}
        </td>
    </ng-container>

    <!-- Venue -->
    <ng-container matColumnDef="venue">
        <th mat-header-cell *matHeaderCellDef>Venue</th>
        <td mat-cell *matCellDef="let row">
            {{row.venue}}
        </td>
    </ng-container>

    <!-- Type -->
    <ng-container matColumnDef="meetingType">
        <th mat-header-cell *matHeaderCellDef>Type</th>
        <td mat-cell *matCellDef="let row">
            {{row.meetingType}}
        </td>
    </ng-container>

    <!-- Status -->
    <!-- <ng-container matColumnDef="status">
        <th mat-header-cell *matHeaderCellDef>Status</th>
        <td mat-cell *matCellDef="let row">
            {{row.status}}
        </td>
    </ng-container> -->
<!-- Status -->

<ng-container matColumnDef="status">

    <th mat-header-cell *matHeaderCellDef>
        Status
    </th>

    <td mat-cell *matCellDef="let row">

        <span
            class="status-chip scheduled"
            *ngIf="row.status==='Scheduled'">

            Scheduled

        </span>

        <span
            class="status-chip draft"
            *ngIf="row.status==='Draft'">

            Draft

        </span>

        <span
            class="status-chip cancelled"
            *ngIf="row.status==='Cancelled'">

            Cancelled

        </span>

    </td>

</ng-container>
    <!-- Actions -->
<ng-container matColumnDef="actions">

    <th mat-header-cell *matHeaderCellDef>

        Actions

    </th>

    <td mat-cell *matCellDef="let row">

        <!-- View -->

        <button
            mat-icon-button
            class="action-btn view"
            matTooltip="View Meeting"
            (click)="viewMeeting(row)">

            <mat-icon>visibility</mat-icon>

        </button>

        <!-- Edit -->

        <button
            mat-icon-button
            class="action-btn edit"
            matTooltip="Edit Meeting"
            [routerLink]="['/meetings/edit', row.meetingId]">

            <mat-icon>edit</mat-icon>

        </button>

        <!-- Delete -->

        <button
            mat-icon-button
            class="action-btn delete"
            matTooltip="Delete Meeting"
            (click)="deleteMeeting(row)">

            <mat-icon>delete</mat-icon>

        </button>

    </td>

</ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>

    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

</table>

<mat-paginator
    [pageSize]="10"
    [pageSizeOptions]="[5,10,20]">
</mat-paginator>
