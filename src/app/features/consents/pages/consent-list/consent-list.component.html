<app-page-header
    title="Member Consents"
    subtitle="Manage Redevelopment Member Consents"
    buttonText="Add Consent"
    buttonIcon="assignment"
    buttonRoute="/consents/add">
</app-page-header>


<app-search-toolbar
    placeholder="Search Consents"
    (search)="applyFilter($event)">
</app-search-toolbar>


<table mat-table
       [dataSource]="dataSource"
       matSort
       class="mat-elevation-z2">


    <!-- Flat Number -->

    <ng-container matColumnDef="flatNumber">

        <th mat-header-cell
            *matHeaderCellDef
            mat-sort-header>

            Flat

        </th>

        <td mat-cell
            *matCellDef="let row">

            {{row.flatNumber}}

        </td>

    </ng-container>



    <!-- Member Name -->

    <ng-container matColumnDef="memberName">

        <th mat-header-cell
            *matHeaderCellDef
            mat-sort-header>

            Member

        </th>

        <td mat-cell
            *matCellDef="let row">

            {{row.memberName}}

        </td>

    </ng-container>



    <!-- Status -->

    <ng-container matColumnDef="consentStatus">

        <th mat-header-cell
            *matHeaderCellDef>

            Status

        </th>


        <td mat-cell
            *matCellDef="let row">


            <span
              class="status-chip"
              [ngClass]="{
                'yes': row.consentStatus === 1,
                'no': row.consentStatus === 2,
                'pending': row.consentStatus === 0
              }">

                {{getStatusText(row.consentStatus)}}

            </span>


        </td>

    </ng-container>



    <!-- Date -->

    <ng-container matColumnDef="consentDate">

        <th mat-header-cell
            *matHeaderCellDef
            mat-sort-header>

            Date

        </th>


        <td mat-cell
            *matCellDef="let row">

            {{row.consentDate | date:'dd-MMM-yyyy'}}

        </td>


    </ng-container>




    <!-- Actions -->

    <ng-container matColumnDef="actions">

        <th mat-header-cell
            *matHeaderCellDef>

            Actions

        </th>


        <td mat-cell
            *matCellDef="let row">


            <!-- Edit -->

            <button
              mat-icon-button
              matTooltip="Edit Consent"
              class="action-btn edit"
              [routerLink]="['/consents/edit', row.consentId]">


                <mat-icon>
                    edit
                </mat-icon>


            </button>



            <!-- Delete -->

            <button
              mat-icon-button
              matTooltip="Delete Consent"
              class="action-btn delete"
              (click)="deleteConsent(row)">


                <mat-icon>
                    delete
                </mat-icon>


            </button>


        </td>


    </ng-container>




    <tr mat-header-row
        *matHeaderRowDef="displayedColumns">
    </tr>


    <tr mat-row
        *matRowDef="let row; columns: displayedColumns;">
    </tr>


</table>



<mat-paginator
    [pageSize]="10"
    [pageSizeOptions]="[5,10,20]">

</mat-paginator>
